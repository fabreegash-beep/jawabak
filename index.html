<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌟 توقع الجمهور - تحدي الأصوات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b6b;
            --primary-dark: #ee5a5a;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg-dark: #1a1a2e;
            --bg-darker: #16213e;
            --panel: rgba(255, 255, 255, 0.95);
            --text-dark: #2d3436;
            --text-light: #ffffff;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --success: #00b894;
            --danger: #e17055;
            --purple: #a855f7;
            --pink: #ec4899;
            --blue: #3b82f6;
            --orange: #f97316;
        }
        
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh; 
            font-family: 'Cairo', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .bubbles-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .bubble {
            position: absolute;
            bottom: -100px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border-radius: 50%;
            animation: rise 8s infinite;
            opacity: 0.4;
        }
        
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.4; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 95%;
            max-width: 550px;
            padding: 10px;
        }

        /* Screen Styles */
        .screen { 
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            padding: 35px 30px; 
            border-radius: 30px; 
            width: 100%;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--purple), var(--pink));
            background-size: 200% 100%;
            animation: gradientShift 3s linear infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .screen:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 
                0 35px 60px rgba(0, 0, 0, 0.35),
                0 0 0 2px rgba(255, 107, 107, 0.3);
        }

        .hidden { display: none !important; }

        /* Typography */
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--purple), var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(168, 85, 247, 0.2);
        }
        
        h2 {
            color: var(--purple);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        h3 {
            color: var(--text-dark);
            font-size: 1.2rem;
            margin: 12px 0;
        }

        .subtitle {
            color: #636e72;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .emoji-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Input Styles */
        .glass-input { 
            padding: 16px 24px; 
            border-radius: 50px; 
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, var(--primary), var(--purple)) border-box;
            color: var(--text-dark); 
            margin: 10px 0; 
            width: 90%; 
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .glass-input:focus {
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, var(--secondary), var(--success)) border-box;
            box-shadow: 0 6px 25px rgba(78, 205, 196, 0.3);
            transform: scale(1.02);
        }
        
        .glass-input::placeholder {
            color: #b2bec3;
        }

        /* Button Styles */
        button { 
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white; 
            border: none; 
            padding: 14px 32px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1.05rem; 
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            margin: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }
        
        button:hover { 
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }
        
        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), var(--success));
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--orange), var(--danger));
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* Game UI Components */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            color: white;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .score-display span {
            color: var(--accent);
        }

        .question-counter {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }

        /* Timer Component */
        .timer-wrapper {
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
            border-radius: 25px;
            padding: 15px 25px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .timer { 
            font-size: 2.5rem; 
            color: var(--accent); 
            font-weight: 800; 
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(255, 230, 109, 0.5);
            letter-spacing: 3px;
        }
        
        .timer-label {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-label span:first-child {
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .score-box { 
            background: linear-gradient(135deg, var(--primary), var(--pink));
            padding: 10px 18px; 
            border-radius: 25px; 
            font-size: 0.95rem;
            color: white;
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            background-size: 200% 100%;
            animation: progressFlow 2s linear infinite;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        @keyframes progressFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Question Card */
        .question-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            border-radius: 20px;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        /* Answers Grid */
        .answers-grid { 
            display: grid; 
            gap: 12px; 
            margin: 20px 0; 
        }
        
        .ans-item { 
            background: linear-gradient(135deg, #ffffff, #f1f3f5);
            padding: 18px 22px;
            border-radius: 20px; 
            border: 3px solid transparent;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .ans-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--purple));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ans-item:hover {
            transform: translateX(-5px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.2);
        }

        .ans-item:hover::before {
            opacity: 1;
        }
        
        .ans-item.found { 
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border-color: var(--success);
            animation: revealPulse 0.6s ease;
        }

        .ans-item.found::before {
            background: linear-gradient(180deg, var(--success), var(--secondary));
            opacity: 1;
        }

        @keyframes revealPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .ans-number {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 12px;
            font-size: 1rem;
            font-weight: 700;
        }

        .ans-item.found .ans-number {
            background: linear-gradient(135deg, var(--success), var(--secondary));
        }

        .ans-text {
            display: flex;
            align-items: center;
            font-size: 1.05rem;
            color: var(--text-dark);
        }
        
        .ans-value {
            background: linear-gradient(135deg, var(--accent), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.2rem;
            font-weight: 800;
        }

        .ans-item.found .ans-value {
            background: linear-gradient(135deg, var(--success), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* Input Group */
        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 16px 22px;
            border-radius: 50px;
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, var(--secondary), var(--blue)) border-box;
            color: var(--text-dark);
            font-size: 1.05rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .input-group input:focus {
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, var(--success), var(--secondary)) border-box;
            box-shadow: 0 6px 25px rgba(78, 205, 196, 0.3);
        }

        /* Feedback Message */
        .feedback-msg {
            font-size: 0.95rem;
            margin-top: 12px;
            min-height: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .feedback-success {
            color: var(--success);
            animation: fadeInUp 0.3s ease;
        }

        .feedback-error {
            color: var(--danger);
            animation: shake 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Player List */
        .player-list {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 25px;
            padding: 18px;
            margin: 15px 0;
        }

        .player-list-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--purple);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 10px 0;
            background: white;
            border-radius: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .player-card:hover {
            transform: translateX(-5px);
            border-color: var(--secondary);
        }
        
        .player-card.you {
            border-color: var(--primary);
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2);
        }

        .player-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .player-score {
            color: var(--primary);
            font-weight: 700;
        }

        /* Room Code Box */
        .room-code-box {
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
            padding: 25px;
            border-radius: 25px;
            margin: 15px 0;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }
        
        .room-code-label {
            color: #a0a0a0;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        
        .room-code {
            font-size: 2.5rem;
            letter-spacing: 12px;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, var(--accent), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        /* Rankings */
        .rank-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 16px 22px; 
            margin: 10px 0;
            background: white;
            border-radius: 20px;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .rank-item:hover {
            transform: translateX(-5px) scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .rank-item:first-child {
            background: linear-gradient(135deg, #fff9e6, #fff3cc);
            border: 2px solid var(--gold);
        }

        .rank-item:nth-child(2) {
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
            border: 2px solid var(--silver);
        }

        .rank-item:nth-child(3) {
            background: linear-gradient(135deg, #fff5eb, #ffe8d6);
            border: 2px solid var(--bronze);
        }

        .rank-name {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
        }

        .rank-score {
            color: var(--success);
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Winner Section */
        .winner-section {
            padding: 25px;
            background: linear-gradient(135deg, #fff9e6, #fff3cc);
            border-radius: 25px;
            margin: 20px 0;
            border: 3px solid var(--gold);
        }

        .winner-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .winner-name { 
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0; 
        }

        .winner-label {
            font-size: 1rem;
            color: var(--text-dark);
            opacity: 0.7;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 1000;
            animation: slideDown 3s ease forwards;
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
        }

        .notification.error {
            background: linear-gradient(135deg, var(--danger), var(--orange));
            box-shadow: 0 8px 30px rgba(225, 112, 85, 0.4);
        }
        
        .notification.success {
            background: linear-gradient(135deg, var(--success), var(--secondary));
            box-shadow: 0 8px 30px rgba(0, 184, 148, 0.4);
        }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
        }

        /* Confetti Animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall 3s linear forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .screen {
                padding: 25px 20px;
                border-radius: 25px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .glass-input {
                padding: 14px 18px;
                font-size: 0.95rem;
            }

            button {
                padding: 12px 24px;
                font-size: 0.95rem;
            }

            .room-code {
                font-size: 2rem;
                letter-spacing: 8px;
            }

            .timer {
                font-size: 2rem;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .ans-item {
                padding: 14px 16px;
            }

            .ans-number {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }

            .ans-text {
                font-size: 0.95rem;
            }

            .ans-value {
                font-size: 1rem;
            }
        }

        /* Additional Animations */
        .float-animation {
            animation: floatUpDown 3s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .spin-animation {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* New Game Button Styling */
        .new-game-btn {
            background: linear-gradient(135deg, var(--success), var(--secondary));
            margin-top: 15px;
        }

        /* Leave Room Button */
        .leave-btn {
            background: linear-gradient(135deg, #636e72, #b2bec3);
            box-shadow: 0 4px 15px rgba(99, 110, 114, 0.4);
        }

        /* Waiting Message */
        .waiting-msg {
            color: var(--purple);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .waiting-dots {
            display: flex;
            gap: 4px;
        }

        .waiting-dots span {
            width: 8px;
            height: 8px;
            background: var(--purple);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }

        .waiting-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .waiting-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Start Button */

// Audio Functions
function playBeep(frequency = 880, duration = 0.3, volume = 0.3) {
    if (!soundEnabled) return;
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = frequency;
        gainNode.gain.value = volume;
        oscillator.type = 'sine';
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
        if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) { console.log("audio error", e); }
}

];

// Initialize particles and bubbles
createParticles();
createBubbles();

let currentGameQuestions = [];

function getRandomQuestions(count) {
    const shuffled = [...allQuestions];
    for(let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, count);
}

// Answer Matching Function
function isMatchingAnswer(userAnswer, correctAnswer) {
    const u = userAnswer.toLowerCase().trim();
    const c = correctAnswer.toLowerCase().trim();
    if (u === c) return true;
    const uWithoutAl = u.replace(/^ال/, '');
    const cWithoutAl = c.replace(/^ال/, '');
    if (uWithoutAl === cWithoutAl) return true;
    if (uWithoutAl.replace(/ه$/, '') === cWithoutAl.replace(/ه$/, '')) return true;
    const synonyms = {
        "قهوة": ["قهوي","coffee"], "شاي": ["شاى","tea"], "بيتزا":["pizza"], "برجر":["برغر"], 
        "قط":["قطة","بسب"], "كلب":["كلبة"], "أسد":["سبع"], "فيل":["فيلة"], "ثعبان":["حية"]
    };
    for(let key in synonyms) if(c === key && synonyms[key].includes(u)) return true;
    return false;
}

// Notification Function
function showNotification(msg, type = "success") {
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.textContent = msg;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

// Screen Navigation
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// Create Room
function createRoom() {
    myName = document.getElementById('userName').value.trim();
    if(!myName) { 
        showNotification("✏️ اكتب اسمك أولاً!", "error"); 
        return; 
    }
    currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
    isHost = true;
    db.ref('rooms/' + currentRoom).set({ 
        status: 'waiting', 
        qIndex: 0, 
        players: { [myId]: { name: myName, score: 0, found: [] } }, 
        timer: 45, 
        questions: null 
    })
    .then(() => { 
        showScreen('waitingScreen'); 
        document.getElementById('roomCode').innerText = currentRoom; 
        listenToRoom(); 
        showNotification(`✅ تم إنشاء الغرفة! الرمز: ${currentRoom}`); 
    })
    .catch(() => showNotification("❌ خطأ في الاتصال!", "error"));
}

// Join Room
function joinRoom() {
    myName = document.getElementById('userName').value.trim();
    const rCode = document.getElementById('roomInput').value.trim();
    if(!myName || rCode.length !== 4) { 
        showNotification("⚠️ تأكد من الاسم ورمز الغرفة!", "error"); 
        return; 
    }
    db.ref('rooms/' + rCode).once('value', snap => {
        if(snap.exists()) {
            if(Object.keys(snap.val().players).length >= 4) { 
                showNotification("❌ الغرفة ممتلئة (4/4)!", "error"); 
                return; 
            }
            currentRoom = rCode;
            db.ref('rooms/' + currentRoom + '/players/' + myId).set({ name: myName, score: 0, found: [] });
            showScreen('waitingScreen'); 
            document.getElementById('roomCode').innerText = currentRoom; 
            listenToRoom();
            showNotification(`✅ انضممت إلى الغرفة ${rCode}`);
        } else { 
            showNotification("❌ الغرفة غير موجودة!", "error"); 
        }
    });
}

// Listen to Room Updates
function listenToRoom() {
    db.ref('rooms/' + currentRoom).on('value', snap => {
        const data = snap.val();
        if(!data) return;
        const players = data.players;
        const playerCount = Object.keys(players).length;
        const pList = document.getElementById('playerList');
        pList.innerHTML = "";
        for(let id in players) {
            const isYou = id === myId;
            pList.innerHTML += `
                <div class="player-card ${isYou ? 'you' : ''}">
                    <div class="player-name">
                        ${isYou ? '👤' : '👥'} ${players[id].name}
                    </div>
                    <div class="player-score">⭐ ${players[id].score}</div>
                </div>`;
        }
        document.getElementById('waitingProgress').style.width = (playerCount / 4) * 100 + '%';
        if(isHost && playerCount >= 2) { 
            document.getElementById('startBtn').classList.remove('hidden'); 
            document.getElementById('waitingMsg').innerHTML = "✅ جاهز! اضغط بدء اللعبة";
        }
        if(data.status === 'playing' && document.getElementById('gameScreen').classList.contains('hidden')) {
            showScreen('gameScreen');
        }
        if(data.status === 'playing') updateGameUI(data);
        if(data.status === 'finished') { 
            clearInterval(timerInterval); 
            showFinalResults(players); 
        }
    });
}

// Start Game
function startGame() {
    currentGameQuestions = getRandomQuestions(4);
    db.ref('rooms/' + currentRoom).update({ 
        status: 'playing', 
        qIndex: 0, 
        timer: 45, 
        questions: currentGameQuestions 
    });
    startTimer();
    showNotification("🎮 بدأت اللعبة! حظاً موفقاً!");
}

// Timer
function startTimer() {
    if(timerInterval) clearInterval(timerInterval);
    let timeLeft = 45;
    timerInterval = setInterval(() => {
        timeLeft--;
        db.ref('rooms/' + currentRoom).update({ timer: timeLeft });
        const display = document.getElementById('timeLeftDisplay');
        if(display) display.innerText = timeLeft;
        const progressPercent = (timeLeft / 45) * 100;
        document.getElementById('questionProgress').style.width = progressPercent + '%';
        if(timeLeft <= 5 && timeLeft > 0) { 
            if(lastTimerSecond !== timeLeft) playWarningBeep(); 
            display?.classList.add('warning-timer');
        } else display?.classList.remove('warning-timer');
        if(timeLeft === 0) { 
            clearInterval(timerInterval); 
            playTimeoutAlarm(); 
            nextQuestionOrFinish(); 
        }
        lastTimerSecond = timeLeft;
    }, 1000);
}

// Update Game UI
function updateGameUI(data) {
    const questions = data.questions || currentGameQuestions;
    if(!questions.length) return;
    const qData = questions[data.qIndex];
    if(!qData) return;
    document.getElementById('questionText').innerText = qData.q;
    document.getElementById('qCount').innerText = `${data.qIndex + 1}`;
    document.getElementById('totalQ').innerText = '4';
    document.getElementById('timeLeftDisplay').innerText = data.timer;
    document.getElementById('myScoreDisplay').innerText = data.players[myId]?.score || 0;
    const myFound = data.players[myId]?.found || [];
    const board = document.getElementById('answersBoard');
    board.innerHTML = "";
    let idx = 1;
    for(let ans in qData.a) {
        const isFound = myFound.includes(ans);
        board.innerHTML += `
            <div class="ans-item ${isFound ? 'found' : ''}">
                <div class="ans-text">
                    <span class="ans-number">${idx}</span>
                    ${isFound ? `✅ ${ans}` : '❓ انتظر...'}
                </div>
                <span class="ans-value">${isFound ? qData.a[ans] + '%' : '???'}</span>
            </div>`;
        idx++;
    }
}

// Submit Guess
function submitGuess() {
    const guessInput = document.getElementById('guessInput');
    const guess = guessInput.value.trim();
    const feedbackMsg = document.getElementById('feedbackMsg');
    
    if(!guess) { 
        feedbackMsg.className = 'feedback-msg feedback-error';
        feedbackMsg.innerHTML = "✏️ اكتب تخميناً أولاً!";
        return; 
    }
    
    db.ref('rooms/' + currentRoom).once('value', snap => {
        const data = snap.val();
        if(!data || data.status !== 'playing') return;
        const questions = data.questions || currentGameQuestions;
        const qData = questions[data.qIndex];
        let matchedAnswer = null;
        for(let ans in qData.a) if(isMatchingAnswer(guess, ans)) { matchedAnswer = ans; break; }
        const myFound = data.players[myId]?.found || [];
        
        if(matchedAnswer && !myFound.includes(matchedAnswer)) {
            const points = qData.a[matchedAnswer];
            const newScore = (data.players[myId]?.score || 0) + points;
            const newFound = [...myFound, matchedAnswer];
            db.ref('rooms/' + currentRoom + '/players/' + myId).update({ score: newScore, found: newFound });
            guessInput.value = "";
            feedbackMsg.className = 'feedback-msg feedback-success';
            feedbackMsg.innerHTML = `🎉 صحيح! +${points} نقطة`;
            showNotification(`✅ صحيح! +${points} نقطة`, "success");
            playSuccessSound();
            updateGameUI({...data, players: {...data.players, [myId]: {...data.players[myId], score: newScore, found: newFound}}});
        } else if(matchedAnswer && myFound.includes(matchedAnswer)) {
            feedbackMsg.className = 'feedback-msg feedback-error';
            feedbackMsg.innerHTML = "⚠️ هذه الإجابة سبق أن اكتشفتها!";
            showNotification("⚠️ هذه الإجابة سبق أن اكتشفتها!", "error");
        } else {
            // ❌ WRONG: clear input automatically
            guessInput.value = "";
            feedbackMsg.className = 'feedback-msg feedback-error';
            feedbackMsg.innerHTML = `❌ "${guess}" غير صحيح! تم مسح الإجابة`;
            showNotification(`❌ "${guess}" غير صحيح! تم مسح الحقل`, "error");
            playBeep(400, 0.2, 0.2);
        }
    });
}

// Next Question or Finish
function nextQuestionOrFinish() {
    if(!isHost) return;
    db.ref('rooms/' + currentRoom).once('value', snap => {
        const data = snap.val();
        if(data.qIndex < 3) {
            db.ref('rooms/' + currentRoom).update({ qIndex: data.qIndex + 1, timer: 45 });
            startTimer();
            showNotification(`📋 السؤال ${data.qIndex + 2} من 4`);
        } else db.ref('rooms/' + currentRoom).update({ status: 'finished' });
    });
}

// Show Final Results
function showFinalResults(players) {
    showScreen('resultScreen');
    const sorted = Object.values(players).sort((a, b) => b.score - a.score);
    document.getElementById('winnerName').innerText = sorted[0].name;
    
    // Trigger confetti for winner
    createConfetti();
    
    const rankDiv = document.getElementById('rankings');
    rankDiv.innerHTML = "";
    sorted.forEach((p, index) => {
        const medal = index === 0 ? '🏆' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : `${index+1}📌`));
        rankDiv.innerHTML += `
            <div class="rank-item">
                <div class="rank-name">
                    ${medal} ${p.name}
                    ${index === 0 ? '🎉' : ''}
                </div>
                <div class="rank-score">⭐ ${p.score} نقطة</div>
            </div>`;
    });
}

// Leave Room
function leaveRoom() { 
    if(currentRoom) db.ref('rooms/' + currentRoom + '/players/' + myId).remove(); 
    location.reload(); 
}

// Keyboard Support
document.addEventListener('keypress', (e) => { 
    if(e.key === 'Enter' && !document.getElementById('gameScreen').classList.contains('hidden')) submitGuess(); 
});
</script>
